spring:
  datasource:
    url: jdbc:h2:mem:petdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate   # validates schema against entities
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

# optional: expose H2 console for debugging
server:
  port: 8080

  servlet:
    context-path: /

h2:
  console:
    enabled: true
    path: /h2-console
